<!DOCTYPE html>
<html>
<head>
  <title>Flashcard App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Flashcards</h1>

  <div id="addFlashcardSection">
    <input type="text" id="newGroup" placeholder="New group name">
    <button onclick="addGroup()">Add Group</button>
  </div>

  <form id="flashcardForm">
    <input type="text" id="question" placeholder="Enter question" required>
    <input type="text" id="answer" placeholder="Enter answer" required>
    <select id="group" required>
      <option value="">Select group</option>
    </select>
    <button type="submit">Add Flashcard</button>
  </form>

  <div id="flashcards"></div>

  <div id="toast" class="toast hidden">Something went wrong. Please try again.</div>

  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal-box">
      <p id="confirmMessage">Are you sure?</p>
      <div class="modal-btn-row">
        <button id="confirmOk">Delete</button>
        <button id="confirmCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
